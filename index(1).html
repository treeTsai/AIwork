<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 AI Prompt 智能寶庫</title>
  <meta name="description" content="收錄精選 AI Prompt，提升你的工作效率" />
  
  <!-- 預連接 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />

  <!-- ── 內嵌精美樣式表 (原 style.css) ── -->
  <style>
    /* 變數定義：打造高級感配色 */
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #e0e7ff;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --success: #10b981;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --radius: 12px;
      --font-sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'Fira Code', 'Courier New', Courier, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.6;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 24px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    header h1 .rocket {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .sheet-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      background: var(--primary-light);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 50px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .sheet-link:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-1px);
    }

    /* ── Search ── */
    .search-section {
      max-width: 700px;
      margin: 32px auto 16px;
      padding: 0 16px;
    }

    .search-box {
      position: relative;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
    }

    .search-box:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      font-size: 1.1rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 16px 16px 16px 48px;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: var(--text-main);
      outline: none;
    }

    #searchInput::placeholder {
      color: var(--text-muted);
    }

    /* ── Category Filters ── */
    .filter-section {
      max-width: 900px;
      margin: 0 auto 24px;
      padding: 0 16px;
    }

    .filter-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .pill {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 8px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .pill:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
    }

    .pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
    }

    /* ── Content Container ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Card Layout ── */
    .groups-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .category-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .category-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 4px solid var(--primary);
      padding-left: 10px;
      margin-top: 8px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── Card Style ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .card-header {
      margin-bottom: 12px;
    }

    .card-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Prompt Code Container */
    .prompt-wrapper {
      position: relative;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 12px;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      margin-bottom: 16px;
    }

    .prompt-content {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: #334155;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
    }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      justify-content: center;
    }

    .btn-copy:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
    }

    /* ── Loading, Empty, Error ── */
    .loading, .empty, .err {
      text-align: center;
      padding: 60px 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      max-width: 500px;
      margin: 40px auto;
    }

    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: var(--primary);
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty p, .err p {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .empty small, .err small {
      color: var(--text-muted);
    }

    .retry {
      margin-top: 16px;
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* 響應式優化 */
    @media (max-width: 640px) {
      header h1 {
        font-size: 1.5rem;
      }
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1><span class="rocket">🚀</span> AI Prompt 智能寶庫</h1>
    <a class="sheet-link" id="sheetLink"
       href="https://docs.google.com/spreadsheets/d/1KXVy8KDduf6W5MBijQYOHyVGVlSNJ5L9HMODoPITTbs/edit?usp=sharing"
       target="_blank" rel="noopener">
      📋 開啟原始資料 Google Sheet
    </a>
  </header>

  <!-- ── Search ── -->
  <div class="search-section">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="搜尋提示詞名稱、內容或分類..." autocomplete="off" />
    </div>
  </div>

  <!-- ── Category Filters ── -->
  <div class="filter-section">
    <div class="filter-wrap" id="filterWrap">
      <button class="pill active" data-cat="全部">全部</button>
    </div>
  </div>

  <!-- ── Content ── -->
  <main id="main">
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <p>正在與 Google Sheet 連線中…</p>
    </div>
    
    <div id="groupsEl" class="groups-container"></div>
    
    <div class="empty" id="emptyEl" hidden>
      <p>🔍 找不到符合的提示詞</p>
      <small>請試試看其他關鍵字，或是切換全部分類</small>
    </div>
    
    <div class="err" id="errEl" hidden>
      <p>⚠️ 無法載入資料</p>
      <small>請確認 Google Sheet 已設為「知道連結的任何人均能查看」後重新整理</small><br/>
      <button class="retry" onclick="init()">重新載入</button>
    </div>
  </main>

  <!-- ── Toast 提示 ── -->
  <div class="toast" id="toast">
    <span>✨ 提示詞已複製到剪貼簿！</span>
  </div>

  <!-- ── 內嵌功能邏輯 (原 app.js) ── -->
  <script>
    // 您的 Google Sheet 試算表 ID
    const SPREADSHEET_ID = '1KXVy8KDduf6W5MBijQYOHyVGVlSNJ5L9HMODoPITTbs';
    // 藉由 Google Visualization API 取得 JSON 格式
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

    let allPrompts = [];
    let categories = ['全部'];
    let currentCategory = '全部';

    // DOM 元素選取
    const loadingEl = document.getElementById('loadingEl');
    const groupsEl = document.getElementById('groupsEl');
    const emptyEl = document.getElementById('emptyEl');
    const errEl = document.getElementById('errEl');
    const filterWrap = document.getElementById('filterWrap');
    const searchInput = document.getElementById('searchInput');
    const toast = document.getElementById('toast');

    // 初始化與抓取資料
    async function init() {
      showState('loading');
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error('Network response was not ok');
        
        const rawText = await response.text();
        // 解析 Google visualization JSON 格式
        const jsonString = rawText.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/);
        if (!jsonString || jsonString.length < 2) throw new Error('JSON format error');
        
        const dataObj = JSON.parse(jsonString[1]);
        parseGoogleSheetData(dataObj);
      } catch (error) {
        console.error('資料載入錯誤:', error);
        showState('error');
      }
    }

    // 解析 Google Sheet 結構
    function parseGoogleSheetData(data) {
      const table = data.table;
      if (!table || !table.rows || table.rows.length === 0) {
        showState('empty');
        return;
      }

      // 取得標頭欄位
      const headers = table.cols.map(col => (col.label || '').trim().toLowerCase());
      
      // 動態分析對應欄位索引
      let categoryIdx = headers.findIndex(h => h.includes('分類') || h.includes('category') || h.includes('cat'));
      let titleIdx = headers.findIndex(h => h.includes('名稱') || h.includes('name') || h.includes('title') || h.includes('標題'));
      let descIdx = headers.findIndex(h => h.includes('描述') || h.includes('description') || h.includes('desc'));
      let promptIdx = headers.findIndex(h => h.includes('提示詞') || h.includes('prompt') || h.includes('content') || h.includes('內容'));

      // 備份機制：如果找不到關鍵字，按預設順序 0: 分類, 1: 名稱, 2: 描述, 3: 提示詞
      if (categoryIdx === -1) categoryIdx = 0;
      if (titleIdx === -1) titleIdx = 1;
      if (descIdx === -1) descIdx = 2;
      if (promptIdx === -1) promptIdx = 3;

      const parsedRows = [];
      const catSet = new Set();

      table.rows.forEach(row => {
        const cells = row.c;
        if (!cells) return;

        // 取得儲存格值
        const getVal = (idx) => {
          if (idx !== -1 && cells[idx]) {
            return cells[idx].v !== null ? String(cells[idx].v).trim() : '';
          }
          return '';
        };

        const category = getVal(categoryIdx) || '未分類';
        const title = getVal(titleIdx);
        const description = getVal(descIdx);
        const prompt = getVal(promptIdx);

        // 如果連標題與提示詞都是空的，則跳過此行
        if (!title && !prompt) return;

        parsedRows.push({ category, title, description, prompt });
        catSet.add(category);
      });

      allPrompts = parsedRows;
      categories = ['全部', ...Array.from(catSet)];

      // 渲染分類按鈕與內容
      renderFilters();
      renderContent();
      showState('content');
    }

    // 建立分類篩選 Pill
    function renderFilters() {
      filterWrap.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `pill ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat;
        btn.dataset.cat = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = cat;
          renderContent();
        });
        filterWrap.appendChild(btn);
      });
    }

    // 渲染卡片內容
    function renderContent() {
      const keyword = searchInput.value.toLowerCase().trim();
      
      // 依分類與關鍵字篩選
      const filtered = allPrompts.filter(item => {
        const matchCategory = (currentCategory === '全部' || item.category === currentCategory);
        const matchSearch = !keyword || 
          item.title.toLowerCase().includes(keyword) || 
          item.description.toLowerCase().includes(keyword) || 
          item.prompt.toLowerCase().includes(keyword) ||
          item.category.toLowerCase().includes(keyword);
        return matchCategory && matchSearch;
      });

      if (filtered.length === 0) {
        groupsEl.innerHTML = '';
        emptyEl.hidden = false;
        return;
      }

      emptyEl.hidden = true;

      // 按分類將資料分組
      const groups = {};
      filtered.forEach(item => {
        if (!groups[item.category]) {
          groups[item.category] = [];
        }
        groups[item.category].push(item);
      });

      groupsEl.innerHTML = '';

      // 分組渲染
      Object.keys(groups).forEach(catName => {
        const groupSec = document.createElement('section');
        groupSec.className = 'category-group';

        const titleEl = document.createElement('h2');
        titleEl.className = 'category-title';
        titleEl.innerHTML = `📂 ${catName}`;
        groupSec.appendChild(titleEl);

        const gridEl = document.createElement('div');
        gridEl.className = 'cards-grid';

        groups[catName].forEach(promptItem => {
          const card = document.createElement('div');
          card.className = 'card';
          
          card.innerHTML = `
            <div>
              <div class="card-header">
                <span class="card-tag">${promptItem.category}</span>
                <h3 class="card-title">${escapeHTML(promptItem.title || '無標題')}</h3>
              </div>
              <p class="card-desc">${escapeHTML(promptItem.description || '點擊複製按鈕快速取得提示詞內容。')}</p>
              <div class="prompt-wrapper">
                <div class="prompt-content">${escapeHTML(promptItem.prompt || '')}</div>
              </div>
            </div>
            <div class="card-actions">
              <button class="btn-copy">📋 複製提示詞</button>
            </div>
          `;

          // 綁定複製按鈕事件
          const copyBtn = card.querySelector('.btn-copy');
          copyBtn.addEventListener('click', () => {
            copyToClipboard(promptItem.prompt, copyBtn);
          });

          gridEl.appendChild(card);
        });

        groupSec.appendChild(gridEl);
        groupsEl.appendChild(groupSec);
      });
    }

    // 複製到剪貼簿功能（完美相容多平台與內嵌環境）
    function copyToClipboard(text, buttonEl) {
      if (!text) return;

      // 優先使用新式 API，若失敗則回退至傳統 execCommand
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(() => showToast(buttonEl))
          .catch(err => fallbackCopy(text, buttonEl));
      } else {
        fallbackCopy(text, buttonEl);
      }
    }

    // 回退傳統複製方案
    function fallbackCopy(text, buttonEl) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.top = '0';
      textArea.style.left = '0';
      textArea.style.width = '2em';
      textArea.style.height = '2em';
      textArea.style.padding = '0';
      textArea.style.border = 'none';
      textArea.style.outline = 'none';
      textArea.style.boxShadow = 'none';
      textArea.style.background = 'transparent';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        const successful = document.execCommand('copy');
        if (successful) showToast(buttonEl);
      } catch (err) {
        console.error('複製失敗:', err);
      }
      document.body.removeChild(textArea);
    }

    // 顯示 Toast 提示與按鈕視覺回饋
    function showToast(buttonEl) {
      // 1. Toast 彈窗
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);

      // 2. 按鈕狀態文字暫時變更
      if (buttonEl) {
        const originalText = buttonEl.innerHTML;
        buttonEl.innerHTML = '✨ 已複製！';
        buttonEl.style.background = 'var(--success)';
        setTimeout(() => {
          buttonEl.innerHTML = originalText;
          buttonEl.style.background = '';
        }, 1500);
      }
    }

    // 防止 HTML 注入的跳脫工具
    function escapeHTML(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // 變更目前顯示的狀態（載入中、錯誤、無內容、顯示內容）
    function showState(state) {
      loadingEl.hidden = true;
      groupsEl.hidden = true;
      emptyEl.hidden = true;
      errEl.hidden = true;

      if (state === 'loading') {
        loadingEl.hidden = false;
      } else if (state === 'error') {
        errEl.hidden = false;
      } else if (state === 'empty') {
        emptyEl.hidden = false;
      } else if (state === 'content') {
        groupsEl.hidden = false;
      }
    }

    // 即時關鍵字搜尋與防抖處理
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        renderContent();
      }, 150);
    });

    // 啟動載入
    window.onload = function() {
      init();
    };
  </script>
</body>
</html>
