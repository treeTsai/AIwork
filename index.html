<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 AI Prompt 智能寶庫</title>
  <meta name="description" content="收錄精選 AI Prompt，提升你的工作效率" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1><span class="rocket">🚀</span> AI Prompt 智能寶庫</h1>
    <a class="sheet-link" id="sheetLink"
       href="https://docs.google.com/spreadsheets/d/1KXVy8KDduf6W5MBijQYOHyVGVlSNJ5L9HMODoPITTbs/edit?usp=sharing"
       target="_blank" rel="noopener">
      📋 開啟原始資料 Google Sheet
    </a>
  </header>

  <!-- ── Search ── -->
  <div class="search-section">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="搜尋提示詞..." autocomplete="off" />
    </div>
  </div>

  <!-- ── Category Filters ── -->
  <div class="filter-section">
    <div class="filter-wrap" id="filterWrap">
      <button class="pill active" data-cat="全部">全部</button>
    </div>
  </div>

  <!-- ── Content ── -->
  <main id="main">
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <p>載入資料中…</p>
    </div>
    <div id="groupsEl"></div>
    <div class="empty" id="emptyEl" hidden>
      <p>🔍 找不到符合的提示詞</p>
      <small>試試其他關鍵字或分類</small>
    </div>
    <div class="err" id="errEl" hidden>
      <p>⚠️ 無法載入資料</p>
      <small>請確認 Google Sheet 已設為「任何人可查看」後重新整理</small><br/>
      <button class="retry" onclick="init()">重新載入</button>
    </div>
  </main>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
