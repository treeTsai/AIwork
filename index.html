<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 AI Prompt 智能寶庫</title>
  <meta name="description" content="收錄精選 AI Prompt，提升你的工作效率" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🚀</span>
          <div>
            <h1 class="site-title">AI Prompt 智能寶庫</h1>
            <p class="site-sub">收錄精選提示詞，讓 AI 為你高效工作</p>
          </div>
        </div>
        <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1KXVy8KDduf6W5MBijQYOHyVGVlSNJ5L9HMODoPITTbs/edit?usp=sharing" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          開啟原始資料
        </a>
      </div>
    </div>
  </header>

  <!-- Search & Filter -->
  <div class="sticky-bar">
    <div class="container">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="searchInput" placeholder="搜尋提示詞名稱或內容…" autocomplete="off" />
        <span class="search-clear" id="searchClear" role="button" tabindex="0" aria-label="清除搜尋">✕</span>
      </div>
      <div class="filter-bar" id="filterBar" role="tablist" aria-label="分類篩選">
        <button class="filter-btn active" data-cat="全部" role="tab" aria-selected="true">全部</button>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="container">
      <span id="statsText">載入中…</span>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div class="container">
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>正在讀取資料…</p>
      </div>
      <div id="cardArea"></div>
      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-icon">🔍</div>
        <p>找不到符合的提示詞</p>
        <small>試試其他關鍵字或分類</small>
      </div>
      <div class="error-state" id="errorState" hidden>
        <div class="empty-icon">⚠️</div>
        <p>無法載入資料</p>
        <small>請確認 Google Sheet 已設為「任何人可查看」，並重新整理頁面</small>
        <button class="retry-btn" onclick="loadData()">重試</button>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>資料來源：Google Sheets &nbsp;·&nbsp; 以 ❤️ 製作</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
